name: urbaflow
description: Urba & Flow — Tienda de ropa urbana para hombre
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Estado y navegación
  provider: ^6.1.2
  go_router: ^14.2.7

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Utilidades
  shared_preferences: ^2.3.2
  uuid: ^4.5.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
